name: CryptoTicker
options:
  bundleIdPrefix: com.cryptoticker
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: Resources/CryptoTicker.entitlements
    PRODUCT_NAME: CryptoTicker
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CryptoTicker:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "**/.DS_Store"
          - "project.yml"
          - "SPEC.md"
          - "CryptoTicker.xcodeproj"
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptoticker.pro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: "NO"
    entitlements:
      path: Resources/CryptoTicker.entitlements

schemes:
  CryptoTicker:
    build:
      targets:
        CryptoTicker: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
